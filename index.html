<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAC Faucet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg:#08090d; --bg2:#0e1018; --bg3:#141720;
    --border:rgba(99,179,255,0.12);
    --accent:#63b3ff; --accent2:#a78bfa;
    --gold:#f0c060; --green:#34d399; --red:#f87171;
    --text:#e2e8f0; --text2:#64748b;
    --glow:0 0 24px rgba(99,179,255,0.2);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Space Grotesk',sans-serif;
    min-height:100vh;display:flex;
    align-items:center;justify-content:center;padding:20px;
  }
  body::before{
    content:'';position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(ellipse 70% 40% at 15% 20%,rgba(99,179,255,0.06) 0%,transparent 60%),
      radial-gradient(ellipse 50% 30% at 85% 80%,rgba(167,139,250,0.06) 0%,transparent 60%);
    pointer-events:none;
  }
  .wrap{position:relative;z-index:1;width:100%;max-width:420px;}

  /* 品牌 */
  .brand{text-align:center;padding-bottom:24px;}
  .logo{
    width:50px;height:50px;margin:0 auto 10px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:#08090d;
  }
  .brand h1{
    font-size:22px;font-weight:700;letter-spacing:3px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    margin-bottom:4px;
  }
  .brand p{font-family:'Space Mono',monospace;font-size:10px;color:var(--text2);letter-spacing:2px;}

  /* 主卡片 */
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;overflow:hidden;}

  /* 网络栏 */
  .netbar{
    padding:10px 20px;background:var(--bg3);
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
    font-family:'Space Mono',monospace;font-size:11px;
  }
  .netleft{display:flex;align-items:center;gap:7px;color:var(--accent);}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--green);
    box-shadow:0 0 6px var(--green);animation:blink 2s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  .body{padding:22px;}

  /* 钱包区 */
  .wallet-box{
    background:var(--bg3);border:1px solid var(--border);
    border-radius:12px;padding:16px;margin-bottom:16px;
  }
  .wallet-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--text2);
    letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
  .wallet-addr{
    font-family:'Space Mono',monospace;font-size:12px;color:var(--accent);
    word-break:break-all;min-height:18px;
  }
  .wallet-bal{
    font-family:'Space Mono',monospace;font-size:20px;font-weight:700;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    margin-top:8px;
  }
  .wallet-bal-lbl{font-size:11px;color:var(--text2);margin-top:2px;}

  /* 按钮 */
  .btn{
    width:100%;padding:14px;border:none;border-radius:11px;
    font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;
    cursor:pointer;transition:all .2s;
    display:flex;align-items:center;justify-content:center;gap:8px;
    margin-bottom:10px;
  }
  .btn-connect{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#08090d;
  }
  .btn-connect:hover{transform:translateY(-1px);box-shadow:var(--glow);}
  .btn-claim{
    background:linear-gradient(135deg,#34d399,#059669);
    color:#fff;font-size:16px;padding:16px;
  }
  .btn-claim:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 0 24px rgba(52,211,153,0.3);}
  .btn-claim:disabled{opacity:.4;cursor:not-allowed;transform:none;}
  .btn-claim.loading{
    background:var(--bg3);color:var(--accent);
    border:1px solid var(--border);
  }
  .btn-claim.success{background:linear-gradient(135deg,#34d399,#059669);}
  .btn-claim.cooldown{
    background:var(--bg3);color:var(--gold);
    border:1px solid rgba(240,192,96,0.3);
  }

  /* 冷却 */
  .cooldown-info{
    background:rgba(240,192,96,0.06);
    border:1px solid rgba(240,192,96,0.2);
    border-radius:10px;padding:12px 14px;
    margin-bottom:12px;display:none;
  }
  .cd-row{display:flex;justify-content:space-between;align-items:center;}
  .cd-label{font-size:12px;color:var(--text2);}
  .cd-timer{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--gold);}
  .cd-bar{height:3px;background:var(--bg);border-radius:2px;margin-top:8px;overflow:hidden;}
  .cd-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--accent));transition:width .5s;}

  /* 分隔 */
  .divider{height:1px;background:var(--border);margin:16px 0;}

  /* TX 结果 */
  .tx-box{
    background:var(--bg3);border:1px solid rgba(52,211,153,0.2);
    border-radius:10px;padding:12px 14px;margin-bottom:12px;display:none;
  }
  .tx-lbl{font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
  .tx-hash{
    font-family:'Space Mono',monospace;font-size:11px;color:var(--green);
    word-break:break-all;cursor:pointer;
  }
  .tx-hash:hover{text-decoration:underline;}

  /* 日志 */
  .log{
    font-family:'Space Mono',monospace;font-size:11px;
    background:var(--bg);border:1px solid var(--border);
    border-radius:8px;padding:12px;max-height:100px;
    overflow-y:auto;color:var(--text2);line-height:1.8;
    margin-bottom:12px;
  }
  .log .ok{color:var(--green);}
  .log .info{color:var(--accent);}
  .log .err{color:var(--red);}

  /* 统计 */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .stat{background:var(--bg3);border:1px solid var(--border);
    border-radius:9px;padding:10px;text-align:center;}
  .sv{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .sl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

  /* Toast */
  .toast{
    position:fixed;bottom:24px;left:50%;
    transform:translateX(-50%) translateY(60px);
    background:var(--bg2);border:1px solid var(--border);
    border-radius:10px;padding:10px 20px;font-size:13px;
    box-shadow:var(--glow);transition:transform .3s;z-index:100;white-space:nowrap;
  }
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.ok{border-color:rgba(52,211,153,.4);color:var(--green);}
  .toast.err{border-color:rgba(248,113,113,.4);color:var(--red);}

  /* 旋转 */
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{display:inline-block;animation:spin 1s linear infinite;}
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <div class="logo">DAC</div>
    <h1>DAC FAUCET</h1>
    <p>INCEPTION TESTNET · CHAIN ID 21894</p>
  </div>

  <div class="card">
    <div class="netbar">
      <div class="netleft"><div class="dot"></div>DAC Inception Testnet</div>
      <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--text2)" id="blockNum">BLK —</div>
    </div>

    <div class="body">

      <!-- 钱包信息 -->
      <div class="wallet-box">
        <div class="wallet-label">钱包地址</div>
        <div class="wallet-addr" id="walletAddr">未连接</div>
        <div class="wallet-bal" id="walletBal">—</div>
        <div class="wallet-bal-lbl">DACC 余额</div>
      </div>

      <!-- 连接钱包 -->
      <button class="btn btn-connect" id="connectBtn" onclick="connectWallet()">
        ⚡ 连接 OKX / MetaMask 钱包
      </button>

      <!-- 冷却倒计时 -->
      <div class="cooldown-info" id="cdBox">
        <div class="cd-row">
          <div class="cd-label">⏳ 冷却中，下次可领</div>
          <div class="cd-timer" id="cdTimer">—</div>
        </div>
        <div class="cd-bar"><div class="cd-fill" id="cdFill" style="width:0%"></div></div>
      </div>

      <!-- 领取按钮 -->
      <button class="btn btn-claim" id="claimBtn" onclick="claimFaucet()" disabled>
        🚰 领取 3 DACC
      </button>

      <!-- TX 结果 -->
      <div class="tx-box" id="txBox">
        <div class="tx-lbl">交易哈希</div>
        <div class="tx-hash" id="txHash" onclick="openTx()"></div>
      </div>

      <!-- 日志 -->
      <div class="log" id="logBox">
        <span class="info">[DAC]</span> Faucet v2.0 — 链上直接调用
        <br><span class="info">[DAC]</span> 合约: 0xaff0...a742
        <br><span class="info">[DAC]</span> 等待钱包连接...
      </div>

      <div class="divider"></div>

      <!-- 统计 -->
      <div class="stats">
        <div class="stat"><div class="sv">3</div><div class="sl">DACC/次</div></div>
        <div class="stat"><div class="sv" id="claimCount">0</div><div class="sl">今日已领</div></div>
        <div class="stat"><div class="sv" id="totalClaimed">0</div><div class="sl">累计 DACC</div></div>
      </div>

    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── 配置 ──────────────────────────────────────────────
const RPC_URL  = "https://rpctest.dachain.tech";
const CHAIN_ID = 21894;
const CHAIN_HEX = "0x" + CHAIN_ID.toString(16);
const EXPLORER = "https://exptest.dachain.tech";

// 水龙头合约地址（从交易分析得出）
const FAUCET   = "0xaff05cbb58752fa12c73d30b98fc87cac52fa742";

// claim() 函数签名 = 0x57bc3d78（从交易数据解析）
const CLAIM_DATA = "0x57bc3d78";

const NETWORK = {
  chainId: CHAIN_HEX,
  chainName: "DAC Inception Testnet",
  nativeCurrency: { name:"DACC", symbol:"DACC", decimals:18 },
  rpcUrls: [RPC_URL],
  blockExplorerUrls: [EXPLORER],
};

// ── 状态 ──────────────────────────────────────────────
let provider = null;
let userAddr  = null;
let cdInterval = null;
let lastClaim  = parseInt(localStorage.getItem("dac_last_claim") || "0");
let totalClaimed = parseInt(localStorage.getItem("dac_total") || "0");
let todayCount   = 0;

// 今日计数
const today = new Date().toDateString();
if (localStorage.getItem("dac_today_date") === today) {
  todayCount = parseInt(localStorage.getItem("dac_today_count") || "0");
}

document.getElementById("totalClaimed").textContent = totalClaimed;
document.getElementById("claimCount").textContent = todayCount;

// ── 区块高度 ──────────────────────────────────────────
async function fetchBlock() {
  try {
    const r = await fetch(RPC_URL, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({jsonrpc:"2.0",method:"eth_blockNumber",params:[],id:1})
    });
    const d = await r.json();
    if (d.result) {
      document.getElementById("blockNum").textContent = "BLK " + parseInt(d.result,16).toLocaleString();
    }
  } catch(e) {}
}
fetchBlock();
setInterval(fetchBlock, 6000);

// ── 连接钱包 ──────────────────────────────────────────
async function connectWallet() {
  // 优先 OKX，其次 MetaMask
  provider = window.okxwallet || window.ethereum;

  if (!provider) {
    showToast("请在 OKX 或 MetaMask 内置浏览器中打开", "err");
    addLog("err", "未检测到钱包，请用 OKX 内置浏览器打开");
    return;
  }

  try {
    addLog("info", "正在连接钱包...");
    const accounts = await provider.request({ method:"eth_requestAccounts" });
    userAddr = accounts[0];

    // 切换到 DAC 网络
    await switchNetwork();

    // 更新 UI
    document.getElementById("walletAddr").textContent = userAddr;
    document.getElementById("connectBtn").textContent = "✅ " + userAddr.slice(0,8) + "..." + userAddr.slice(-6);
    document.getElementById("connectBtn").style.background = "rgba(99,179,255,0.1)";
    document.getElementById("connectBtn").style.border = "1px solid var(--accent)";
    document.getElementById("connectBtn").style.color = "var(--accent)";

    addLog("ok", "钱包连接成功: " + userAddr.slice(0,10) + "...");

    // 查余额
    await fetchBalance();

    // 检查冷却
    checkCooldown();

  } catch(e) {
    addLog("err", "连接失败: " + e.message);
    showToast("连接失败: " + e.message.slice(0,30), "err");
  }
}

// ── 切换网络 ──────────────────────────────────────────
async function switchNetwork() {
  try {
    await provider.request({ method:"wallet_switchEthereumChain", params:[{chainId:CHAIN_HEX}] });
    addLog("ok", "已切换到 DAC Testnet");
  } catch(e) {
    if (e.code === 4902 || e.code === -32603) {
      try {
        await provider.request({ method:"wallet_addEthereumChain", params:[NETWORK] });
        addLog("ok", "DAC Testnet 已添加并切换");
      } catch(e2) {
        addLog("err", "添加网络失败: " + e2.message);
      }
    }
  }
}

// ── 查余额 ────────────────────────────────────────────
async function fetchBalance() {
  if (!userAddr) return;
  try {
    const r = await fetch(RPC_URL, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        jsonrpc:"2.0", method:"eth_getBalance",
        params:[userAddr, "latest"], id:1
      })
    });
    const d = await r.json();
    if (d.result) {
      const wei = BigInt(d.result);
      const dacc = Number(wei) / 1e18;
      document.getElementById("walletBal").textContent = dacc.toFixed(4);
    }
  } catch(e) {}
}

// ── 检查冷却 ──────────────────────────────────────────
function checkCooldown() {
  // 先查链上 nextClaimTime（如果合约有的话），否则用本地记录
  const now = Date.now();
  const elapsed = now - lastClaim;
  const COOLDOWN = 8 * 60 * 60 * 1000; // 8小时

  if (lastClaim && elapsed < COOLDOWN) {
    startCooldownUI(COOLDOWN - elapsed, COOLDOWN);
  } else {
    // 可以领取
    document.getElementById("claimBtn").disabled = false;
    document.getElementById("claimBtn").textContent = "🚰 领取 3 DACC";
    document.getElementById("claimBtn").className = "btn btn-claim";
    document.getElementById("cdBox").style.display = "none";
  }
}

function startCooldownUI(remaining, total) {
  document.getElementById("claimBtn").disabled = true;
  document.getElementById("claimBtn").className = "btn btn-claim cooldown";
  document.getElementById("cdBox").style.display = "block";

  clearInterval(cdInterval);
  let rem = remaining;

  function tick() {
    if (rem <= 0) {
      clearInterval(cdInterval);
      checkCooldown();
      return;
    }
    const h = Math.floor(rem/3600000);
    const m = Math.floor((rem%3600000)/60000);
    const s = Math.floor((rem%60000)/1000);
    document.getElementById("cdTimer").textContent =
      String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
    const pct = ((total - rem) / total * 100).toFixed(1);
    document.getElementById("cdFill").style.width = pct + "%";
    document.getElementById("claimBtn").textContent = "⏳ 冷却中 " +
      String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
    rem -= 1000;
  }
  tick();
  cdInterval = setInterval(tick, 1000);
}

// ── 领取水龙头 ────────────────────────────────────────
async function claimFaucet() {
  if (!userAddr) { showToast("请先连接钱包", "err"); return; }

  const btn = document.getElementById("claimBtn");
  btn.disabled = true;
  btn.className = "btn btn-claim loading";
  btn.innerHTML = '<span class="spin">⟳</span> 发送交易中...';

  addLog("info", "正在调用 claim() 合约...");
  addLog("info", "合约: " + FAUCET);
  addLog("info", "函数: 0x57bc3d78");

  try {
    // 获取当前 chainId 确认网络正确
    const chainResult = await fetch(RPC_URL, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({jsonrpc:"2.0",method:"eth_chainId",params:[],id:1})
    });
    const chainData = await chainResult.json();
    const currentChain = parseInt(chainData.result, 16);

    if (currentChain !== CHAIN_ID) {
      addLog("err", "网络错误，请切换到 DAC Testnet");
      await switchNetwork();
    }

    // 发送交易
    const txHash = await provider.request({
      method: "eth_sendTransaction",
      params: [{
        from:  userAddr,
        to:    FAUCET,
        value: "0x0",
        data:  CLAIM_DATA,
        gas:   "0x30D40", // 200000 gas
      }]
    });

    addLog("ok", "交易已提交: " + txHash.slice(0,18) + "...");
    addLog("info", "等待确认...");

    // 显示 TX hash
    document.getElementById("txHash").textContent = txHash;
    document.getElementById("txHash").dataset.hash = txHash;
    document.getElementById("txBox").style.display = "block";

    // 等待确认
    const receipt = await waitForReceipt(txHash);

    if (receipt && receipt.status === "0x1") {
      // 成功
      addLog("ok", "✅ 领取成功！+3 DACC");
      btn.className = "btn btn-claim success";
      btn.textContent = "✅ 领取成功 +3 DACC";
      btn.disabled = true;

      // 更新统计
      lastClaim = Date.now();
      localStorage.setItem("dac_last_claim", lastClaim);

      todayCount++;
      totalClaimed += 3;
      localStorage.setItem("dac_today_date", new Date().toDateString());
      localStorage.setItem("dac_today_count", todayCount);
      localStorage.setItem("dac_total", totalClaimed);

      document.getElementById("claimCount").textContent = todayCount;
      document.getElementById("totalClaimed").textContent = totalClaimed;

      showToast("✅ 成功领取 3 DACC！", "ok");

      // 刷新余额
      setTimeout(fetchBalance, 3000);

      // 开始冷却
      setTimeout(() => {
        startCooldownUI(8 * 60 * 60 * 1000, 8 * 60 * 60 * 1000);
      }, 2000);

    } else {
      addLog("err", "交易失败，请重试");
      btn.disabled = false;
      btn.className = "btn btn-claim";
      btn.textContent = "🚰 领取 3 DACC";
      showToast("❌ 交易失败", "err");
    }

  } catch(e) {
    addLog("err", "错误: " + (e.message || "未知错误").slice(0, 60));
    btn.disabled = false;
    btn.className = "btn btn-claim";
    btn.textContent = "🚰 领取 3 DACC";

    if (e.code === 4001) {
      showToast("❌ 用户取消了交易", "err");
    } else {
      showToast("❌ " + (e.message || "领取失败").slice(0,40), "err");
    }
  }
}

// ── 等待 TX 确认 ──────────────────────────────────────
async function waitForReceipt(txHash, maxAttempts = 30) {
  for (let i = 0; i < maxAttempts; i++) {
    await sleep(2000);
    try {
      const r = await fetch(RPC_URL, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          jsonrpc:"2.0", method:"eth_getTransactionReceipt",
          params:[txHash], id:1
        })
      });
      const d = await r.json();
      if (d.result) return d.result;
    } catch(e) {}
  }
  return null;
}

// ── 工具 ──────────────────────────────────────────────
function openTx() {
  const hash = document.getElementById("txHash").dataset.hash;
  if (hash) window.open(EXPLORER + "/tx/" + hash, "_blank");
}

function addLog(type, msg) {
  const box = document.getElementById("logBox");
  const line = document.createElement("div");
  const time = new Date().toLocaleTimeString();
  line.innerHTML = `<span class="${type}">[${time}]</span> ${msg}`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

let tt;
function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + (type||"");
  clearTimeout(tt);
  tt = setTimeout(() => t.classList.remove("show"), 3500);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// 页面加载时检查本地冷却状态
window.addEventListener("load", () => {
  if (lastClaim) {
    const elapsed = Date.now() - lastClaim;
    const COOLDOWN = 8 * 60 * 60 * 1000;
    if (elapsed < COOLDOWN) {
      // 显示冷却但不禁用连接按钮
      addLog("info", "检测到冷却中，连接钱包后自动显示");
    }
  }
});
</script>
</body>
</html>
